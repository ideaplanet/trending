name: schedule

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run bun
        run: |
          git config --local user.email "bot@github.com"
          git config --local user.name "bot"
          git pull --rebase
          bun run mod.ts
          git add .
          git diff --cached --quiet || git commit -m "update by github action"
          git push
